<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斷點切版練習</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <style>
        .box {
            height: 150px;
            margin: 15px;
            text-align: center;
            font-size: 50px;
            line-height: 150px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-12 d-md-none d-lg-block">
                <div class="box bg-info">
                    Header
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">01</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">02</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">03</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">04</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">05</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">06</div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">01</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">02</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">03</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">04</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">05</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">06</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">07</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">08</div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 d-none d-md-block">
                <div class="box bg-warning">
                    Footer
                </div>
            </div>
        </div>
    </div>
    <script src="/js/bootstrap.bundle.min.js"></script>
</body>

</html>
