<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人履歷 - 林廷輝 Tim</title>
    <link rel="stylesheet" href="/css/all.min.css">
    <link rel="stylesheet" href="/css/personalAICSS.css" crossorigin>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 新增：確保 padding 與 border 不會撐破原本設定的寬高 */
        }

        /* 新增：優化全域文字選取色彩，提升細節質感 */
        ::selection {
            background-color: var(--selection-bg);
            color: var(--selection-text);
        }

        body {
            background-color: var(--bg-main);
            font-family: "Kaisei Decol", "Helvetica Neue", "Noto Sans TC", serif;
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            /* 新增：讓字體在 Mac/iOS 等視網膜螢幕上更細緻 */
        }

        /* ==========================================================================
 s01:個人名片區塊
 ========================================================================== */
        .s01 {
            background-color: var(--bg-section-alt);
            height: 100vh;
            min-height: 600px;
            /* 新增：限制最小高度，防止在矮螢幕上元素重疊 */
            position: relative;
            overflow: hidden;
            /* 新增：確保四角裝飾若有微調不超出螢幕 */
        }

        /* 四角裝飾方塊：將原本200px縮小為80px，改為精緻的內斂日式邊框裝飾 */
        .s01 .box01,
        .s01 .box02,
        .s01 .box03,
        .s01 .box04 {
            width: 80px;
            height: 80px;
            background-color: var(--color-primary);
            opacity: 0.85;
            /* 新增：微透明，使其不過於沉重 */
        }

        .s01 .box01 {
            position: absolute;
            top: 0;
            left: 0;
        }

        .s01 .box02 {
            position: absolute;
            top: 0;
            right: 0;
        }

        .s01 .box03 {
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .s01 .box04 {
            position: absolute;
            bottom: 0;
            right: 0;
        }

        /* 中央大圖卡片 */
        .s01 .userImg {
            position: absolute;
            top: 60px;
            bottom: 60px;
            left: 60px;
            right: 60px;
            background-color: var(--bg-card);
            background-image: url(/images/fuji02.jpg);
            background-position: center;
            background-size: cover;
            border-radius: 12px;
            /* 優化：由20px改為12px，更顯洗練俐落，符合冷靜風格 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            /* 優化：將原本死黑的 border-color 陰影改為現代高級感微影 */
        }

        /* 名片文字區 */
        .s01 .userText {
            position: absolute;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            /* 新增：精確垂直置中 */
            background-color: var(--user-text-bg);
            /* 新增：加入半透明日式白襯底，避免背景圖干擾閱讀 */
            padding: 30px 40px;
            /* 新增：襯底內距 */
            border-radius: 8px;
            /* 新增：襯底圓角 */
            backdrop-filter: blur(4px);
            /* 新增：微毛玻璃效果，增添現代感 */
            max-width: 500px;
            /* 新增：限制最大寬度，避免字串過長 */
            border-left: 4px solid var(--color-primary);
            /* 新增：左側和風裝飾色條 */
        }

        .s01 .userText h1 {
            font-size: 32px;
            /* 優化：字級設定 */
            color: var(--text-primary);
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
            /* 新增：中文字元間距，更顯清晰 */
        }

        .s01 .userText hr {
            border: none;
            height: 1px;
            background-color: var(--border-color);
            /* 優化：精細化分隔線 */
            margin: 15px 0;
        }

        .s01 .userText h2 {
            font-size: 16px;
            /* 優化：座右銘字級調小，建立視覺層級 (Visual Hierarchy) */
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.8;
        }

        /* ==========================================================================
 s02:作品集區塊
 ========================================================================== */
        .s02 {
            padding: 100px 10%;
            /* 優化：加大上下間距，給予視覺呼吸空間 */
            text-align: center;
            background-color: var(--bg-main);
        }

        .s02 .h2,
        .s02 h2 {
            font-size: 28px;
            /* 優化：稍微縮小，更顯優雅 */
            color: var(--color-primary);
            margin-bottom: 40px;
            /* 新增：與下方卡片的間距 */
            letter-spacing: 3px;
            position: relative;
            display: inline-block;
        }

        /* 新增：標題下方的小裝飾線，強化日式清新感 */
        .s02 .h2::after,
        .s02 h2::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background-color: var(--color-secondary);
            margin: 8px auto 0 auto;
        }

        /* 作品卡片外層容器 (原本無，但在 HTML 中為多個 .card 平級) */
        /* 優化：利用現代 Flex 佈局替代原本的 inline-block，完美解決間距與換行對齊問題 */
        .s02 {
            display: block;
        }

        /* 由於不能改動 HTML 結構，直接針對 .card 進行現代排版優化 */
        .s02 .card {
            width: 260px;
            /* 優化：寬度微調 */
            background-color: var(--bg-card);
            /* 優化：卡片改用純白，與主背景形成對比 */
            border-radius: 12px;
            /* 優化：圓角微調 */
            margin: 15px;
            /* 優化：均勻的四週外距 */
            display: inline-block;
            /* 保持原架構相容性 */
            vertical-align: top;
            /* 新增：確保卡片內容長短不一時，頂部依然對齊 */
            text-align: left;
            /* 新增：卡片內文字改為置左，方便閱讀 */
            padding: 25px 20px;
            /* 新增：舒適的卡片內距 */
            box-shadow: 0 4px 15px var(--card-shadow);
            /* 優化：輕柔質感的陰影 */
            border: 1px solid rgba(209, 219, 219, 0.5);
            /* 新增：極淡的邊框提升精緻度 */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            /* 新增：卡片懸停動畫過渡 */
        }

        /* 新增：滑鼠懸停在卡片上的微浮起效果 */
        .s02 .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(43, 51, 62, 0.12);
        }

        .s02 .card h3 {
            font-size: 18px;
            padding-top: 0;
            margin-bottom: 12px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .s02 .card p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 20px;
            /* 新增：與下方按鈕的間距 */
            height: 44px;
            /* 新增：固定描述高度，確保按鈕能水平對齊（容納兩行字） */
            overflow: hidden;
        }

        /* 作品連結按鈕 */
        .s02 .card a {
            text-decoration: none;
            display: block;
            /* 優化：改為 block 滿寬按鈕，視覺更清晰、更好點擊 */
            text-align: center;
            /* 新增：文字置中 */
            background-color: var(--color-secondary);
            color: var(--text-on-btn);
            /* 優化：使用專屬按鈕文字色 */
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            /* 優化：俐落的圓角 */
            margin: 10px;
            /* 優化：清除原本混亂的 margin */
            padding: 10px 15px;
            box-shadow: 0 4px 6px var(--btn-shadow);
            /* 優化：改用低飽和陰影 */
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            /* 優化：更輕快的動畫時間與曲線 */
        }

        /* 按鈕 Hover 狀態 */
        .s02 .card a:hover {
            background-color: var(--btn-hover-bg);
            /* 優化：Hover 時轉為沉穩的縹色 */
            color: var(--text-on-btn);
            box-shadow: 0 6px 12px rgba(58, 80, 107, 0.3);
            /* 優化：重新計算搭配主調色的陰影 */
            transform: scale(1.02);
            /* 新增：輕微放大效果，點擊感更好 */
        }
    </style>
</head>

<body>
    <section class="s01">
        <div class="box01"></div>
        <div class="box02"></div>
        <div class="box03"></div>
        <div class="box04"></div>
        <div class="userImg"></div>
        <div class="userText">
            <h1>林廷輝 Tim</h1>
            <hr>
            <h2>座右銘:坐在也不小子熱門，一遍財政，簽名如同項。</h2>
            <p></p>
        </div>
    </section>
    <section class="s02">
        <h2>我的作品</h2>
        <div class="card">
            <h3>切版練習</h3>
            <p>使用html,css做切版練習</p>
            <a href="/HTML/Practice1.html" target="_blank">查看作品(草稿)</a>
            <a href="/HTML/Practice1-AI.html" target="_blank">查看作品(AI)</a>
        </div>
        <div class="card">
            <h3>Table排版</h3>
            <p>使用Bootstrap架構進行排版練習</p>
            <a href="/BootStrap/20260605(table).html" target="_blank">查看作品(草稿)</a>
            <a href="/BootStrap/20260605(table-AI).html" target="_blank">查看作品(AI)</a>
         </div>
        <div class="card">
            <h3>代定</h3>
            <p>無</p>
            <a href=#>查看作品</a>
        </div>
        <div class="card">
            <h3>代定</h3>
            <p>無</p>
            <a href=#>查看作品</a>
        </div>
    </section>
</body>

</html>
