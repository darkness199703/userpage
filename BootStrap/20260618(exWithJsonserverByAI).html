<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斷點切版+hover練習(匯入josn資料庫)</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <!-- 建議引入 Bootstrap Icons 用於地址與電話圖示（選填） -->
    <link rel="stylesheet" href="../css/personalAICSS.css">

    <style>
        .header {
            height: 160px;
            background-image: url(../images/aoiike.jpg);
            background-position: center;
            background-size: cover;
        }

        .box {
            height: 100px;
            margin: 5px;
            text-align: center;
            font-size: 45px;
            line-height: 100px;
            font-weight: 500;
        }

        @media screen and (min-width: 768px) {
            .box {
                height: 200px;
                line-height: 200px;
            }
        }

        @media screen and (min-width: 992px) {
            .box {
                width: 200px;
                border-radius: 50%;
            }
        }

        @media screen and (min-width: 1200px) {
            .box {
                height: 220px;
                width: 220px;
                line-height: 220px;
                border-radius: 50%;
            }
        }

        /* 重構後的 .storCard 樣式 */
        .storCard {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #fff;
        }

        /* 滑過整張卡片時的微懸浮效果 */
        .storCard:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        /* 圖片與 Hover 遮罩容器 */
        .card-img-wrap {
            position: relative;
            overflow: hidden;
            height: 200px;
            /* 固定圖片區塊高度，避免圖片比例不同導致卡片錯格 */
        }

        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 確保圖片不變形填滿 */
        }

        /* 遮罩基礎設定 */
        .roller_box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s ease, opacity 0.4s ease;
            z-index: 2;
            opacity: 0;
            /* 預設隱藏 */
        }

        /* 滑過圖片容器時顯示遮罩 */
        .card-img-wrap:hover .roller_box {
            opacity: 1;
            transform: translate(0, 0) !important;
            /* 觸發時歸位 */
        }
    </style>
</head>

<body>
    <div class="container my-4">
        <!-- 橫幅區 -->
        <div class="row mb-4">
            <div class="col-12 d-none d-sm-block">
                <div class="header"></div>
            </div>
        </div>

        <!-- 選單按紐區 -->
        <div class="row justify-content-center g-3 mb-5">
            <div class="col-12 col-sm-6 col-md-3 d-flex justify-content-center">
                <div class="box bg-info w-100">選單01</div>
            </div>
            <div class="col-12 col-sm-6 col-md-3 d-flex justify-content-center">
                <div class="box bg-info w-100">選單02</div>
            </div>
            <div class="col-12 col-sm-6 col-md-3 d-flex justify-content-center">
                <div class="box bg-info w-100">選單03</div>
            </div>
            <div class="col-12 col-sm-6 col-md-3 d-flex justify-content-center">
                <div class="box bg-info w-100">選單04</div>
            </div>
        </div>

        <!-- 景點卡片區 -->
        <div id="store" class="row g-4">
            <!-- 景點 001 (由上方滑入) -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="storCard card h-100 overflow-hidden">
                    <div class="card-img-wrap roller-t">
                        <div class="roller_box">
                            <a href="#" class="btn btn-light px-4 py-2 fw-bold">查看詳情</a>
                        </div>
                        <img src="../images/furano01.jpg" alt="旅遊景點001">
                    </div>
                    <div class="card-body d-flex flex-column p-4">
                        <h3 class="card-title h4 text-center mb-3">旅遊景點001</h3>
                        <p class="card-text text-secondary small mb-4">
                            這裡是一段精簡的景點文字簡介。字數大約控制在二十字到五十字之間，完美呈現在網頁上，介紹這裡迷人的風景與特色。
                        </p>
                        <ul class="list-unstyled text-start small text-muted border-top pt-3 mt-auto">
                            <li class="mb-2">
                                <i class="bi bi-geo-alt-fill text-danger me-2"></i><strong>地址：</strong>北海道空知郡上富良野町東町123號
                            </li>
                            <li>
                                <i class="bi bi-telephone-fill text-primary me-2"></i><strong>電話：</strong>0167-45-XXXX
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/jquery-4.0.0.js"></script>
    <script>
        $(function () {
            $.ajax({
                type: "GET",
                url: "https://data.moa.gov.tw/Service/OpenData/ODwsv/ODwsvTravelFood.aspx?IsTransData=1&UnitId=193",
                dataType: "json",
                success: function (data) {
                    // console.log(data);
                    const newData = data.map(function (item, index) {
                        let name = (item.Name ?? "").trim();
                        if (name == "") {
                            name = "未提供"
                        }
                        let img = (item.PicURL ?? "").trim();
                        if (img == "") {
                            img = "未提供"
                        }
                        let address = (item.Address ?? "").trim();
                        if (address == "") {
                            address = "未提供"
                        }
                        let city = (item.City ?? "").trim();
                        if (city == "") {
                            city = "未提供"
                        }
                        let town = (item.Town ?? "").trim();
                        if (town == "") {
                            town = "未提供"
                        }
                        let tel = (item.Tel ?? "").trim();
                        if (tel == "") {
                            tel = "未提供"
                        }
                        let desciption = (item.HostWords ?? "").trim();
                        if (desciption == "") {
                            desciption = "未提供"
                        }
                        let url = (item.Url ?? "").trim();
                        if (url == "") {
                            url = "未提供"
                        }
                        return {
                            id: index + 1,
                            name: name,
                            img: img,
                            address: city + town + address,
                            tel: tel,
                            desciption: desciption,
                            url: url
                        }
                    });
                    newData.forEach(function (item) {
                        let strHTML = `<div class="col-12 col-md-6 col-lg-4">
                                            <div class="storCard card h-100 overflow-hidden">
                                                <div class="card-img-wrap roller-t">
                                                    <div class="roller_box">
                                                        <a href=${item.url} class="btn btn-light px-4 py-2 fw-bold">查看詳情</a>
                                                    </div>
                                                    <img src=${item.img} alt="旅遊景點${item.index}">
                                                </div>
                                                <div class="card-body d-flex flex-column p-4">
                                                    <h3 class="card-title h4 text-center mb-3">${item.name}</h3>
                                                    <p class="card-text text-secondary small mb-4">${item.desciption}</p>
                                                    <ul class="list-unstyled text-start small text-muted border-top pt-3 mt-auto">
                                                        <li class="mb-2">
                                                            <i class="bi bi-geo-alt-fill text-danger me-2"></i><strong>地址：</strong>${item.address}
                                                        </li>
                                                        <li>
                                                            <i class="bi bi-telephone-fill text-primary me-2"></i><strong>電話：</strong>${item.tel}
                                                        </li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>`;
                        $("#store").append(strHTML);
                    });
                },
                error: function (err) {
                    console.log(err);
                }
            });
        });
    </script>
</body>
