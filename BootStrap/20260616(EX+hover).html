<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斷點切版練習+hover/click動畫</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <style>
        .box {
            height: 150px;
            margin: 15px;
            text-align: center;
            font-size: 50px;
            line-height: 150px;
        }
        /* 新增滾動roller、滾動物件roller_box、觸發滾動條件roller:hover */
        .roller{
            position: relative;
            /* 溢位(超出範圍)時隱藏 */
            overflow: hidden;
        }
        .roller .roller_box{
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 255, 255, 0.438);
            /* 初始位置上方-100%(將格子往上移一個格子的距離) */
            top: -100%;
            transition: top 1s;

        }
        .roller:hover .roller_box{
            /* 觸發時將格子移回原位 */
            top: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-12 d-md-none d-lg-block">
                <div class="box bg-info">
                    Header
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <!-- 新增roller動畫 -->
                <div class="box bg-primary roller">
                    <div class="roller_box">01</div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">02</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">03</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">04</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">05</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="box bg-primary">06</div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">01</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">02</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">03</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">04</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">05</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">06</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">07</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="box bg-secondary">08</div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 d-none d-md-block">
                <div class="box bg-warning">
                    Footer
                </div>
            </div>
        </div>
    </div>
    <script src="../js/bootstrap.bundle.min.js"></script>
</body>

</html>
