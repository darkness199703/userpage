<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格相關</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/all.min.css">
    <link rel="stylesheet" href="/css/personnalCSS.css">
    <style>
        @media screen and (max-width: 768px) {
            .table-rwd thead, caption{
                display:none;
            }
            .table-rwd tbody tr{
                display: block;
                margin-top: 20px;
                border: 2px solid var(--color-secondary);
                border-radius: 15px;
            }
            .table-rwd tbody tr td{
                display: block;
                /* 避免跑版(溢位) */
                overflow: hidden;
            }
            /* 偽元素 */
            .table-rwd tbody tr td::before{
                content: attr(data-th) " : ";
                font-size: 20px;
                font-weight: bold;
                color: var(--text-primary);
                display: block;
                float: left;
                width: 30%;
                text-align: center;
            }
            .table-rwd tbody tr td span{
                display: block;
                float: left;
                width: 70%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <table class="table mt-3 table-bordered table-hover table-striped table-rwd">
            <caption>表1.產品列表</caption>
            <thead class="table-dark">
                <tr class="table-primary">
                    <th class="table-danger">項目</th>
                    <th>品名</th>
                    <th>型號</th>
                    <th>價格</th>
                    <th>數量</th>
                </tr>
            </thead>
            <tbody>
                <tr class="bg-primary">
                    <td data-th="項目" class="bg-danger"><span>001</span></td>
                    <td data-th="品名"><span>咖啡</span></td>
                    <td data-th="型號"><span>caffe</span></td>
                    <td data-th="價格"><span>100</span></td>
                    <td data-th="數量"><span>10</span></td>
                </tr>
                <tr>
                    <td data-th="項目">002</td>
                    <td data-th="品名">可樂</td>
                    <td data-th="型號">cola</td>
                    <td data-th="價格">50</td>
                    <td data-th="數量">100</td>
                </tr>
                <tr>
                    <td data-th="項目">003</td>
                    <td data-th="品名">紅茶</td>
                    <td data-th="型號">blackTea</td>
                    <td data-th="價格">50</td>
                    <td data-th="數量">100</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="/js/bootstrap.bundle.min.js"></script>
</body>

</html>
