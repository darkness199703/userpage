<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootStrap的欄&列</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/personalAICSS.css">
    <style>
        .box01{
            height: 160px;
            margin-top: 15px;
        }
        .box02{
            height: 150px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="display-3 fw-700 text-primary">1. 基本排版</div>
        <div class="row">
            <!-- 6/12有2塊 -->
            <div class="col-6">
                <div class="box01 bg-info"></div>
            </div>
            <div class="col-6">
                <div class="box01 bg-info"></div>
            </div>
            <!-- 4/12 + 2/12 -->
             <div class="col-4">
                <div class="box01 bg-info"></div>
            </div>
            <div class="col-2">
            <div class="box01 bg-info"></div>
            </div>
        </div>
       <div class="row">
            <!-- 螢幕寬度>=576pz的時候改變 -->
            <div class="col-sm-4">
                <div class="box01 bg-danger"></div>
            </div>
            <!-- 螢幕寬度>=768pz的時候改變 -->
            <div class="col-md-3">
                <div class="box01 bg-black"></div>
            </div>
            <!-- 螢幕寬度>=992pz的時候改變 -->
            <div class="col-lg-6">
                <div class="box01 bg-success"></div>
            </div>
            <!-- 螢幕寬度>=1200pz的時候改變 -->
            <div class="col-xl-2">
                <div class="box01 bg-info"></div>
            </div>
            <!-- 螢幕寬度>=1400pz的時候改變 -->
            <div class="col-xxl-1">
                <div class="box01 bg-primary"></div>
            </div>
            <!-- 可以將一個區塊依不同螢幕做切分(斷點) -->
             <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 col-xxl-1">
                <div class="box01 bg-secondary"></div>
             </div>
       </div>
       <div class="display-3 fw-700 text-primary">2. 推格子(offset)</div>
       <div class="row">
            <div class="col-6">
                <div class="box01 bg-warning"></div>
            </div>
            <div class="col-6 offset-3">
                <div class="box01 bg-warning"></div>
            </div>
            <!-- 在lg尺寸後再右推 -->
            <div class="col-6 offset-lg-3">
                <div class="box01 bg-warning"></div>
            </div>
       </div>
       <div class="display-3 fw-700 text-primary">3. 區塊間格Gutter</div>
            <!-- 水平垂直間隔3 -->
            <div class="row g-3">
                <div class="col-3">
                    <div class="box02 bg-danger"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-danger"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-danger"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-danger"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-danger"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-danger"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-danger"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-danger"></div>
                </div>
            </div>
            <!-- 水平間隔1 垂直間隔4 -->
            <div class="row gx-1 gy-5">
                <div class="col-3">
                    <div class="box02 bg-info"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-info"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-info"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-info"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-info"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-info"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-info"></div>
                </div>
                <div class="col-3">
                    <div class="box02 bg-info"></div>
                </div>
            </div>
    </div>
    <script src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
