<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/personalAICSS.css">
    <title>匯入地方美食json檔</title>
     <style>
        @media screen and (max-width: 768px) {
            .table-rwd thead, caption{
                display:none;
            }
            .table-rwd tbody tr{
                display: block;
                margin-top: 20px;
                border: 2px solid var(--color-secondary);
                border-radius: 15px;
            }
            .table-rwd tbody tr td{
                display: block;
                /* 避免跑版(溢位) */
                overflow: hidden;
            }
            /* 偽元素 */
            .table-rwd tbody tr td::before{
                content: attr(data-th) " : ";
                font-size: 20px;
                font-weight: bold;
                color: var(--text-primary);
                display: block;
                float: left;
                width: 30%;
                text-align: center;
            }
            .table-rwd tbody tr td span{
                display: block;
                float: left;
                width: 70%;
            }
        }
    </style>
</head>
<body>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/jquery-4.0.0.js"></script>
    <script>
        $(function(){
            //載入資料
            $.ajax({
                type:"GET",
                url:"https://data.moa.gov.tw/Service/OpenData/ODwsv/ODwsvTravelFood.aspx?IsTransData=1&UnitId=193",
                dataType:"json",
                success: function(data){
                    console.log(data);
                    //資料清洗:只選擇要的資料
                    const cleanData = data.map(function(item,index){
                        //名稱
                        let name = (item.Name ?? "").trim();
                        if(name == ""){
                            name = "未提供"
                        }
                        //圖片
                        let img = (item.PicURL ?? "").trim();
                        if(img == ""){
                            img = "未提供"
                        }
                        //地址
                        let address = (item.Address ?? "").trim();
                        if(address == ""){
                            address = "未提供"
                        }
                        let city = (item.City ?? "").trim();
                        if(city == ""){
                            city = "未提供"
                        }
                        let town = (item.Town ?? "").trim();
                        if(town == ""){
                            town = "未提供"
                        }
                        //電話
                        let tel = (item.Tel ?? "").trim();
                        if(tel == ""){
                            tel = "未提供"
                        }
                        //簡介
                        let desciption = (item.HostWords ?? "").trim();
                        if(desciption == ""){
                            desciption = "未提供"
                        }
                        return{
                            id : index+1,
                            name : name,
                            img : img,
                            address : city + town + address,
                            tel : tel,
                            desciption : desciption
                        }
                    });
                    console.log("清洗後",cleanData);
                    //先將最一開始的表格輕零再將清洗後的資料渲染至table
                    $("#mybody").empty();
                    cleanData.forEach(function(item){
                        let strHTML = `<tr>
                                            <td data-th="編號"><span>${item.id}</span></td>
                                            <td data-th="名稱"><span>${item.name}</span></td>
                                            <td data-th="圖片"><span>
                                                <img src=${item.img} class="img-fluid" alt="">
                                            </span></td>
                                            <td data-th="地址"><span>${item.address}</span></td>
                                            <td data-th="電話"><span>${item.tel}</span></td>
                                            <td data-th="簡介"><span>${item.desciption}</span></td>
                                        </tr>`;
                        $("#mybody").append(strHTML);
                    });
                },
                error: function(err){
                    console.log(err);
                }
                
            });
        });
    </script>
    <div class="container">
        <div class="display-3 text-center fw-900">將OpenData清洗後匯入表格</div>
        <table class="table mt-3 table-bordered table-hover table-striped table-rwd">
            <caption>店家清單</caption>
            <thead class="table-dark">
                <tr>
                    <th>編號</th>
                    <th>名稱</th>
                    <th>圖片</th>
                    <th>地址</th>
                    <th>電話</th>
                    <th>簡介</th>
                </tr>
            </thead>
            <tbody id="mybody">
                <tr>
                    <td data-th="編號"><span>001</span></td>
                    <td data-th="名稱"><span>Test</span></td>
                    <td data-th="圖片"><span>
                        <img src="https://ezgo.ardswc.gov.tw/_api/content/images/agrispots/25120/480x360_agrispots-image-khbonm2dh0udqkznzbk59a.png" class="img-fluid" alt="">
                    </span></td>
                    <td data-th="地址"><span>XCAFFA</span></td>
                    <td data-th="電話"><span>345610874404</span></td>
                    <td data-th="簡介"><span>不夠一般別的蔬菜個性，只要如何靈活女朋友是有刪除保健全體界面注意四周天使，她的規範依法查找旅遊提出時刻努力肌膚股份有限公司，如此請求如同市委勞動便宜裝修孤獨評論密碼即將活力組成基本上，準備看到像是啟動基層因而一定要熱門高校戰略要在，消息點這裡，你們而已筆。
                    </span></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
